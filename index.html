<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dark Souls Remastered Build Optimiser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Dark Souls Remastered</h1>
    <h2>Build Optimiser</h2>

    <div class="stats-container">
        <label for="str">Strength</label>
        <input type="number" id="str" placeholder="Enter value" />

        <label for="dex">Dexterity</label>
        <input type="number" id="dex" placeholder="Enter value" />

        <label for="int">Intelligence</label>
        <input type="number" id="int" placeholder="Enter value" />

        <label for="fth">Faith</label>
        <input type="number" id="fth" placeholder="Enter value" />
    </div>
    <p id="output">Output will appear here</p>

    <script src="js/pageLogic/page.js"></script>
  </body>
</html>
